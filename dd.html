<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Admin | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="d-flex" id="wrapper">
        <div class="bg-dark text-white border-end" id="sidebar-wrapper">
            <div class="sidebar-heading border-bottom p-4">
                <h4 class="m-0 fw-bold text-primary">NEX<span>DASH</span></h4>
            </div>
            <div class="list-group list-group-flush p-3">
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-white active"><i class="fas fa-home me-2"></i> Overview</a>
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-white"><i class="fas fa-users me-2"></i> Users</a>
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-white"><i class="fas fa-file-invoice me-2"></i> Reports</a>
                <a href="#" class="list-group-item list-group-item-action bg-transparent text-white"><i class="fas fa-cog me-2"></i> Settings</a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 shadow-sm">
                <button class="btn btn-primary btn-sm" id="menu-toggle"><i class="fas fa-bars"></i></button>
                <div class="ms-auto">
                    <span class="text-muted fw-bold">Welcome, Admin</span>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="stat-card p-4 shadow-sm bg-white rounded-4 border-start border-primary border-5">
                            <small class="text-muted fw-bold">TOTAL REVENUE</small>
                            <h3 class="mb-0 mt-2">$24,500</h3>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card p-4 shadow-sm bg-white rounded-4 border-start border-success border-5">
                            <small class="text-muted fw-bold">ACTIVE SESSIONS</small>
                            <h3 class="mb-0 mt-2">1,240</h3>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card p-4 shadow-sm bg-white rounded-4 border-start border-warning border-5">
                            <small class="text-muted fw-bold">NEW TASKS</small>
                            <h3 class="mb-0 mt-2">45</h3>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white border-bottom p-4 d-flex justify-content-between align-items-center">
                        <h5 class="m-0 fw-bold">Pending Registrations</h5>
                        <button class="btn btn-dark btn-sm" onclick="window.print()">Print Report</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Name</th>
                                        <th>Date</th>
                                        <th>Status</th>
                                        <th class="text-end pe-4">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td class="ps-4">Rahul Kumar</td>
                                        <td>Mar 19, 2026</td>
                                        <td><span class="badge bg-success">Approved</span></td>
                                        <td class="text-end pe-4"><button class="btn btn-outline-primary btn-sm">Edit</button></td>
                                    </tr>
                                    <tr>
                                        <td class="ps-4">Sanya Malhotra</td>
                                        <td>Mar 18, 2026</td>
                                        <td><span class="badge bg-warning text-dark">Pending</span></td>
                                        <td class="text-end pe-4"><button class="btn btn-outline-primary btn-sm">Edit</button></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("menu-toggle").addEventListener("click", () => {
            document.getElementById("wrapper").classList.toggle("toggled");
        });
    </script>
    <style>
        #wrapper {
    overflow-x: hidden;
    background-color: #f8f9fa;
}

#sidebar-wrapper {
    min-height: 100vh;
    width: 260px;
    transition: margin 0.25s ease-out;
}

#sidebar-wrapper .list-group-item {
    padding: 1rem 1.25rem;
    border: none;
    border-radius: 10px;
    margin-bottom: 5px;
}

#sidebar-wrapper .list-group-item.active {
    background: rgba(13, 110, 253, 0.15) !important;
    color: #0d6efd !important;
    font-weight: bold;
}

#page-content-wrapper {
    min-width: 100vw;
}

/* Sidebar Toggle Logic */
#wrapper.toggled #sidebar-wrapper {
    margin-left: -260px;
}

@media (min-width: 768px) {
    #page-content-wrapper {
        min-width: 0;
        width: 100%;
    }
}


/* Card Effects */
.stat-card {
    transition: transform 0.3s ease;
}

.stat-card:hover {
    transform: translateY(-5px);
}

/* Print Styling */
@media print {
    #sidebar-wrapper, #menu-toggle, .btn {
        display: none !important;
    }
    #page-content-wrapper {
        width: 100% !important;
        margin: 0 !important;
    }
}
    </style>
</body>
</html>
