<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admission Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>

</script>
    <style>
        body { background-color: #f4f7f6; 
      
    background: url("https://educhanger.in/admission/navyug/back1.jpg") no-repeat center center/cover;
    min-height: 70vh;

background-position: cover ;
background-repeat: no-repeat;
        }
        body::before{
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(171, 164, 164, 0.4); /* opacity control */
    z-index: -1;
}
.form-container {
    background: rgba(255,255,255,0.9);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    margin-top: 50px;
    margin-bottom: 50px;
    backdrop-filter: blur(5px);
}
        .section-title {
            border-left: 5px solid #007bff;
            padding-left: 15px;
            margin-bottom: 25px;
            color: #007bff;
            font-weight: bold;
        }
        .blog-title{
text-align:center;
font-weight:bold;
animation: fadeDown 1s ease;
}

@keyframes fadeDown{
from{
opacity:0;
transform:translateY(-30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
    </style>
</head>
<body>

<div id="header"></div>
   <h1 class="blog-title">Student   Admission Form</h1>
   <br>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10 form-container" data-aos="zoom-in">
            <h2 class="text-center mb-5">Student Admission Form 2026-27</h2>
            
            <form action="#" method="POST" enctype="multipart/form-data">
                
                <h4 class="section-title" data-aos="fade-right">Academic Details</h4>
                <div class="row g-3 mb-4" data-aos="fade-up">
                    <div class="col-md-6">
                        <label class="form-label">Applying for Class *</label>
                        <select class="form-select" required>
                            <option value="">Select Class</option>
                            <option>Nursery</option>
                            <option>Class 1</option>
                            <option>Class 5</option>
                            <option>Class 10</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Previous School Name</label>
                        <input type="text" class="form-control" placeholder="Enter last school attended">
                    </div>
                </div>

                <h4 class="section-title">Personal Details</h4>
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">First Name *</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Last Name *</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Date of Birth *</label>
                        <input type="date" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Gender *</label>
                        <div class="mt-2">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="male" value="male" required>
                                <label class="form-check-label" for="male">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                                <label class="form-check-label" for="female">Female</label>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Blood Group</label>
                        <select class="form-select">
                            <option>A+</option>
                            <option>B+</option>
                            <option>O+</option>
                            <option>AB+</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Nationality</label>
                        <input type="text" class="form-control" value="Indian">
                    </div>
                </div>

                <h4 class="section-title">Parent / Guardian Details</h4>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Father's Name *</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mother's Name *</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mobile Number *</label>
                        <input type="tel" class="form-control" placeholder="10 digit number" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email ID</label>
                        <input type="email" class="form-control" placeholder="example@mail.com">
                    </div>
                </div>

                <h4 class="section-title">Contact Address</h4>
                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <label class="form-label">Residential Address *</label>
                        <textarea class="form-control" rows="2" required></textarea>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">City *</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">State *</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Pincode *</label>
                        <input type="text" class="form-control" required>
                    </div>
                </div>

                <h4 class="section-title">Documents Upload</h4>
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Student Photo (Max 2MB)</label>
                        <input type="file" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Birth Certificate (PDF/JPG)</label>
                        <input type="file" class="form-control">
                    </div>
                </div>

                <hr class="my-4">

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" value="" id="terms" required>
                    <label class="form-check-label" for="terms">
                        I hereby declare that the information provided is true to the best of my knowledge.
                    </label>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <button type="reset" class="btn btn-light me-md-2">Reset</button>
                    <button type="submit" class="btn btn-light px-5">Submit Registration</button>
                </div>

            </form>
        </div>
    </div>
</div>
<footer>
    <img src="https://navyugkotdwar.in/wp-content/uploads/2025/12/IMG_8615-444x350.webp w-100%" alt="">
</footer>
<script>
        fetch("header.html")
            .then(res => res.text())
            .then(data => { document.getElementById("header").innerHTML = data; })
            .catch(err => console.error("Header load failed. Use a local server (Live Server)!"));

        // Load Footer
        fetch("footer.html")
            .then(res => res.text())
            .then(data => { document.getElementById("footer").innerHTML = data; })
            .catch(err => console.error("Footer load failed."));
            </script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
