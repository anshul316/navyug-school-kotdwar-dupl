<title>Gallery</title>

<style>

.gallery-section{
background:#f5f5f5;
padding:60px 0;
}

.gallery-img{
width:100%;
height:250px;
object-fit:cover;
border-radius:6px;
transition:0.3s;
}

.gallery-img:hover{
transform:scale(1.05);
}
.gallery-item{
position:relative;
overflow:hidden;
border-radius:8px;
}

.gallery-item::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:50%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.5),
transparent
);
transition:0.6s;
}

.gallery-item:hover::before{
left:120%;
}

.gallery-img{
width:100%;
height:250px;
object-fit:cover;
transition:0.4s;
}

.gallery-item:hover .gallery-img{
transform:scale(1.08);
}
</style>

</head>
